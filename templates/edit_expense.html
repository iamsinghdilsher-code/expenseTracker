{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}
<section class="add-section">
    <div class="add-inner">

        <div class="add-header">
            <h1 class="add-title">Edit Expense</h1>
            <p class="add-subtitle"><a href="{{ url_for('expenses') }}" class="back-link">&#8592; Back to dashboard</a></p>
        </div>

        <div class="method-panel">
            {% if error %}
            <div class="flash flash-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense['id']) }}" class="expense-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input id="amount" class="form-input" type="number" name="amount"
                               step="0.01" min="0.01" value="{{ expense['amount'] }}" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" class="form-input form-select" name="category">
                            {% for cat in categories %}
                            <option value="{{ cat }}" {{ 'selected' if cat == expense['category'] }}>{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input id="date" class="form-input" type="date" name="date" value="{{ expense['date'] }}">
                    </div>
                    <div class="form-group">
                        <label for="description">Description <span class="form-optional">(optional)</span></label>
                        <input id="description" class="form-input" type="text" name="description"
                               value="{{ expense['description'] or '' }}">
                    </div>
                </div>
                <div style="display:flex; gap:1rem; margin-top:0.25rem">
                    <button type="submit" class="btn-submit" style="flex:1">Save Changes</button>
                    <a href="{{ url_for('expenses') }}" class="btn-ghost" style="flex:1; text-align:center; padding:0.7rem">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</section>
{% endblock %}
